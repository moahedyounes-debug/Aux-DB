<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUX ASC — تسجيل الدخول</title>
    <meta name="description" content="بوابة الدخول لداشبورد AUX لخدمات ما بعد البيع" />
    <meta property="og:title" content="AUX ASC — تسجيل الدخول" />
    <meta property="og:description" content="بوابة الدخول لداشبورد AUX لخدمات ما بعد البيع" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }
      body {
        font-family: "Cairo", system-ui, -apple-system, sans-serif;
        color: #e6edf5;
        background:
          radial-gradient(1200px 700px at 85% -10%, rgba(56, 189, 248, 0.16), transparent 60%),
          radial-gradient(900px 600px at -10% 110%, rgba(99, 102, 241, 0.16), transparent 60%),
          linear-gradient(180deg, #05070d 0%, #0a0f1c 60%, #05070d 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow-x: hidden;
      }
      .shell {
        width: 100%;
        max-width: 420px;
        position: relative;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
        display: grid;
        place-items: center;
        font-weight: 800;
        color: #0a0f1c;
        font-size: 18px;
        box-shadow: 0 12px 30px -12px rgba(56, 189, 248, 0.6);
      }
      .brand-name {
        font-weight: 800;
        letter-spacing: 1px;
        font-size: 22px;
      }
      .brand-sub {
        font-size: 12px;
        color: #7d8aa1;
        margin-top: 2px;
      }
      .card {
        background: rgba(15, 22, 38, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 20px;
        padding: 32px 28px;
        backdrop-filter: blur(14px);
        box-shadow:
          0 40px 80px -30px rgba(2, 6, 23, 0.9),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .card h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 700;
      }
      .card p.lead {
        margin: 0 0 26px;
        color: #94a3b8;
        font-size: 13.5px;
      }
      .field {
        display: block;
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 12.5px;
        color: #b6c2d6;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .field .input-wrap {
        position: relative;
      }
      .field input {
        width: 100%;
        background: rgba(2, 6, 23, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.18);
        color: #e6edf5;
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        font-size: 14px;
        transition:
          border-color 0.18s,
          box-shadow 0.18s,
          background 0.18s;
        outline: none;
      }
      .field input::placeholder {
        color: #55627a;
      }
      .field input:focus {
        border-color: rgba(56, 189, 248, 0.7);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
        background: rgba(2, 6, 23, 0.9);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 4px 0 20px;
        font-size: 12.5px;
        color: #94a3b8;
      }
      .row label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      .row input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: #38bdf8;
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 13px 16px;
        font: inherit;
        font-weight: 700;
        font-size: 14.5px;
        color: #04121f;
        background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
        cursor: pointer;
        transition:
          transform 0.06s,
          box-shadow 0.18s,
          filter 0.18s;
        box-shadow: 0 14px 32px -14px rgba(56, 189, 248, 0.7);
      }
      .btn:hover {
        filter: brightness(1.05);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        display: none;
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fecaca;
        font-size: 13px;
        text-align: center;
      }
      .error.show {
        display: block;
      }
      .foot {
        margin-top: 22px;
        text-align: center;
        font-size: 11.5px;
        color: #566178;
        letter-spacing: 0.4px;
      }
      .foot a {
        color: #7dd3fc;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-name">AUX ASC</div>
          <div class="brand-sub">لوحة تحكم خدمات ما بعد البيع</div>
        </div>
      </div>

      <section class="card" aria-labelledby="login-title">
        <h1 id="login-title">تسجيل الدخول</h1>
        <p class="lead">ادخل بياناتك للوصول إلى لوحة التحكم.</p>

        <form id="login-form" autocomplete="on" novalidate>
          <div class="field">
            <label for="username">اسم المستخدم</label>
            <div class="input-wrap">
              <input
                id="username"
                name="username"
                type="text"
                placeholder="admin"
                required
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field">
            <label for="password">كلمة المرور</label>
            <div class="input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <div class="row">
            <label><input type="checkbox" id="remember" checked /> تذكرني</label>
            <span>&nbsp;</span>
          </div>

          <button type="submit" class="btn" id="submit-btn">دخول لوحة التحكم</button>
          <div id="error" class="error">اسم المستخدم أو كلمة المرور غير صحيحة.</div>
        </form>
      </section>

      <p class="foot">© AUX ASC · جميع الحقوق محفوظة</p>
    </main>

    <script>
      // ============================================================
      // إعدادات الدخول — عدّل هذه القيم كما تريد
      // ============================================================
      const CREDENTIALS = [
        { user: "admin", pass: "aux2026" },
        // أضف مستخدمين إضافيين هنا إذا أردت
      ];

      // رابط لوحة التحكم بعد تسجيل الدخول (Lovable)
      const DASHBOARD_URL =
        "https://id-preview--b8a4a2f1-0ed8-44dd-9c92-ab14b39de405.lovable.app/";
      // ============================================================

      const form = document.getElementById("login-form");
      const errorBox = document.getElementById("error");
      const btn = document.getElementById("submit-btn");

      // إذا كان مسجّل مسبقاً — حوّله للداشبورد مباشرة
      try {
        const stored =
          localStorage.getItem("aux_auth") || sessionStorage.getItem("aux_auth");
        if (stored === "1") {
          window.location.replace(DASHBOARD_URL);
        }
      } catch (_) {}

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorBox.classList.remove("show");
        const u = document.getElementById("username").value.trim().toLowerCase();
        const p = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        const ok = CREDENTIALS.some(
          (c) => c.user.toLowerCase() === u && c.pass === p,
        );

        if (!ok) {
          errorBox.classList.add("show");
          return;
        }

        try {
          if (remember) localStorage.setItem("aux_auth", "1");
          else sessionStorage.setItem("aux_auth", "1");
        } catch (_) {}

        btn.disabled = true;
        btn.textContent = "جارٍ الدخول...";
        window.location.href = DASHBOARD_URL;
      });
    </script>
  </body>
</html>
