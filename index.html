<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASC Dashboard — Secure Access</title>
    <meta name="description" content="Sign in to the AUX ASC Dashboard — maintenance performance intelligence for service centres.">
    
    
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,*::before,*::after { box-sizing: border-box; }
      html,body { margin:0; padding:0; min-height:100%; }
      :root {
        --aux-blue: #003D8F;
        --aux-blue-hover: #002E6C;
        --ink: #0F172A;
        --muted: #64748B;
        --line: #E2E8F0;
        --bg: #F1F5F9;
        --card: #FFFFFF;
        --danger: #DC2626;
      }
      body {
        font-family: "Inter", "Noto Sans Arabic", "Noto Sans SC", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 500px at 90% -10%, rgba(0,61,143,0.06), transparent 60%),
          radial-gradient(700px 500px at -10% 110%, rgba(0,61,143,0.05), transparent 60%),
          var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      html[dir="rtl"] body { font-family: "Noto Sans Arabic", "Inter", system-ui, sans-serif; }
      html[lang="zh"] body { font-family: "Noto Sans SC", "Inter", system-ui, sans-serif; }

      .shell { width: 100%; max-width: 420px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 20px 60px -30px rgba(15,23,42,0.25);
      }
      .brand { display:flex; align-items:center; gap:14px; margin-bottom: 22px; }
      .logo-box {
        width: 62px; height: 62px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        display: grid; place-items: center;
        background: #fff;
        padding: 8px;
      }
      .logo-box svg { display:block; }
      .brand-text .t1 { font-weight: 800; color: var(--aux-blue); font-size: 20px; letter-spacing:.2px; line-height:1.1; }
      .brand-text .t2 { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

      .lang-bar {
        background: #F8FAFC;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px;
        display: flex; align-items: center; justify-content: center;
        gap: 4px; margin: 8px 0 22px;
      }
      .lang-btn {
        border: 0; background: transparent; cursor: pointer;
        font: inherit; font-weight: 600; font-size: 13px;
        color: var(--muted);
        padding: 6px 16px; border-radius: 999px;
        transition: background .15s, color .15s;
      }
      .lang-btn:hover { color: var(--ink); }
      .lang-btn.active { background: var(--aux-blue); color: #fff; }

      hr.sep { border:0; border-top:1px solid var(--line); margin: 4px 0 22px; }

      .card h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; color: var(--ink); }
      .card p.lead { margin: 0 0 22px; color: var(--muted); font-size: 13.5px; line-height:1.55; }

      .field { display:block; margin-bottom: 16px; }
      .field label {
        display:block; font-size: 11px; letter-spacing: .8px;
        color: var(--muted); margin-bottom: 8px; font-weight: 700;
        text-transform: uppercase;
      }
      .field input {
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--ink);
        border-radius: 10px;
        padding: 12px 14px;
        font: inherit; font-size: 14px;
        transition: border-color .18s, box-shadow .18s;
        outline: none;
      }
      .field input::placeholder { color: #94A3B8; }
      .field input:focus {
        border-color: var(--aux-blue);
        box-shadow: 0 0 0 3px rgba(0,61,143,0.12);
      }

      .btn {
        width: 100%; border: 0; border-radius: 10px;
        padding: 13px 16px; font: inherit; font-weight: 700; font-size: 14.5px;
        color: #fff; background: var(--aux-blue); cursor: pointer;
        transition: background .18s, transform .06s;
        display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      }
      .btn:hover { background: var(--aux-blue-hover); }
      .btn:active { transform: translateY(1px); }
      .btn[disabled] { opacity: .65; cursor: not-allowed; }
      .btn .arrow { transition: transform .18s; }
      html[dir="rtl"] .btn .arrow { transform: scaleX(-1); }

      .error {
        display:none; margin-top: 14px; padding: 10px 12px;
        border-radius: 10px; background: #FEF2F2;
        border: 1px solid #FECACA; color: var(--danger);
        font-size: 13px; text-align: center;
      }
      .error.show { display:block; }

      .foot { margin-top: 18px; text-align:center; font-size: 11.5px; color: #94A3B8; }
    </style>
    <meta property="og:title" content="ASC Dashboard — Secure Access">
  <meta name="twitter:title" content="ASC Dashboard — Secure Access">
  <meta property="og:description" content="Sign in to the AUX ASC Dashboard — maintenance performance intelligence for service centres.">
  <meta name="twitter:description" content="Sign in to the AUX ASC Dashboard — maintenance performance intelligence for service centres.">
  <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/989bd53c-88eb-4d9f-9ced-7696ec9afdbc/id-preview-460447ba--b8a4a2f1-0ed8-44dd-9c92-ab14b39de405.lovable.app-1784145760802.png">
  <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/989bd53c-88eb-4d9f-9ced-7696ec9afdbc/id-preview-460447ba--b8a4a2f1-0ed8-44dd-9c92-ab14b39de405.lovable.app-1784145760802.png">
  <meta name="twitter:card" content="summary_large_image">
</head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="brand">
          <div class="logo-box" aria-hidden="true">
            <svg viewBox="0 0 100 60" width="46" height="28">
              <text x="50" y="30" text-anchor="middle" font-family="Inter, sans-serif"
                    font-weight="800" font-size="26" fill="#003D8F" letter-spacing="1">AUX</text>
              <text x="50" y="46" text-anchor="middle" font-family="Inter, sans-serif"
                    font-weight="600" font-size="6" fill="#003D8F" letter-spacing="2">AIR CONDITIONER</text>
            </svg>
          </div>
          <div class="brand-text">
            <div class="t1" data-i18n="brand">ASC Dashboard</div>
            <div class="t2" data-i18n="tagline">Maintenance Performance Intelligence</div>
          </div>
        </div>

        <div class="lang-bar" role="tablist" aria-label="Language">
          <button class="lang-btn active" data-lang="en" type="button">EN</button>
          <button class="lang-btn" data-lang="ar" type="button">ع</button>
          <button class="lang-btn" data-lang="zh" type="button">中</button>
        </div>

        <hr class="sep" />

        <h1 data-i18n="title">Secure Access</h1>
        <p class="lead" data-i18n="lead">Enter your registered email address to access your service center data.</p>

        <form id="login-form" autocomplete="on" novalidate>
          <div class="field">
            <label for="email" data-i18n="email_label">EMAIL ADDRESS</label>
            <input id="email" name="email" type="email" placeholder="you@servicecentre.com"
                   required autocomplete="email" dir="ltr" style="text-align:left" />
          </div>

          <button type="submit" class="btn" id="submit-btn">
            <span data-i18n="submit">Access Dashboard</span>
            <span class="arrow" aria-hidden="true">→</span>
          </button>
          <div id="error" class="error"></div>
        </form>
      </section>
      <p class="foot">© AUX ASC · All rights reserved</p>
    </main>

    <script>
      // ============================================================
      const DASHBOARD_URL = "https://id-preview--b8a4a2f1-0ed8-44dd-9c92-ab14b39de405.lovable.app/";
      const ACCESS_CHECK_URL = "https://project--b8a4a2f1-0ed8-44dd-9c92-ab14b39de405.lovable.app/api/public/access-check";
      // ============================================================

      const I18N = {
        en: {
          brand: "ASC Dashboard", tagline: "Maintenance Performance Intelligence",
          title: "Secure Access",
          lead: "Enter your registered email address to access your service center data.",
          email_label: "EMAIL ADDRESS", submit: "Access Dashboard",
          err_invalid: "Please enter a valid email address.",
          err_not_auth: "This email is not authorized to access the dashboard.",
          err_network: "Cannot reach the server. Please try again.",
          err_generic: "Verification failed. Please try again.",
          verifying: "Verifying…", entering: "Entering…",
          dir: "ltr", lang: "en",
        },
        ar: {
          brand: "لوحة تحكم ASC", tagline: "ذكاء أداء الصيانة",
          title: "الدخول الآمن",
          lead: "أدخل بريدك الإلكتروني المسجل للوصول إلى بيانات مركز الصيانة الخاص بك.",
          email_label: "البريد الإلكتروني", submit: "دخول لوحة التحكم",
          err_invalid: "يرجى إدخال بريد إلكتروني صحيح.",
          err_not_auth: "البريد الإلكتروني غير مصرح له بالدخول.",
          err_network: "تعذر الاتصال بالخادم، حاول مرة أخرى.",
          err_generic: "تعذر التحقق حالياً.",
          verifying: "جارٍ التحقق…", entering: "جارٍ الدخول…",
          dir: "rtl", lang: "ar",
        },
        zh: {
          brand: "ASC 仪表板", tagline: "维修性能情报",
          title: "安全访问",
          lead: "输入您注册的电子邮箱以访问您的服务中心数据。",
          email_label: "电子邮箱", submit: "进入仪表板",
          err_invalid: "请输入有效的电子邮箱。",
          err_not_auth: "该邮箱未获得访问权限。",
          err_network: "无法连接服务器，请重试。",
          err_generic: "验证失败，请重试。",
          verifying: "验证中…", entering: "进入中…",
          dir: "ltr", lang: "zh",
        },
      };

      let currentLang = (localStorage.getItem("aux_lang") || "en");
      if (!I18N[currentLang]) currentLang = "en";

      const form = document.getElementById("login-form");
      const errorBox = document.getElementById("error");
      const btn = document.getElementById("submit-btn");
      const btnText = btn.querySelector("[data-i18n='submit']");

      function applyLang(lang) {
        currentLang = lang;
        localStorage.setItem("aux_lang", lang);
        const t = I18N[lang];
        document.documentElement.lang = t.lang;
        document.documentElement.dir = t.dir;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });
        document.querySelectorAll(".lang-btn").forEach((b) => {
          b.classList.toggle("active", b.dataset.lang === lang);
        });
      }
      applyLang(currentLang);

      document.querySelectorAll(".lang-btn").forEach((b) => {
        b.addEventListener("click", () => applyLang(b.dataset.lang));
      });

      // Already signed in? -> straight to dashboard
      try {
        const stored = localStorage.getItem("aux_access") || sessionStorage.getItem("aux_access");
        if (stored) window.location.replace(DASHBOARD_URL);
      } catch (_) {}

      function showError(msgKey) {
        errorBox.textContent = I18N[currentLang][msgKey] || I18N[currentLang].err_generic;
        errorBox.classList.add("show");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("show");
        const email = document.getElementById("email").value.trim().toLowerCase();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError("err_invalid"); return;
        }
        btn.disabled = true;
        btnText.textContent = I18N[currentLang].verifying;
        try {
          const res = await fetch(ACCESS_CHECK_URL + "?email=" + encodeURIComponent(email));
          const data = await res.json();
          if (!res.ok || !data.ok) {
            const map = { invalid_email: "err_invalid", not_authorized: "err_not_auth", internal_error: "err_generic" };
            showError(map[data.error] || "err_generic");
            btn.disabled = false;
            btnText.textContent = I18N[currentLang].submit;
            return;
          }
          const payload = JSON.stringify({ ...data.access, lang: currentLang, savedAt: Date.now() });
          try { localStorage.setItem("aux_access", payload); } catch (_) {}
          btnText.textContent = I18N[currentLang].entering;
          window.location.href = DASHBOARD_URL;
        } catch (err) {
          console.error(err);
          showError("err_network");
          btn.disabled = false;
          btnText.textContent = I18N[currentLang].submit;
        }
      });
    </script>
  </body>
</html>
